worker_processes auto;
events { worker_connections 4096; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Trust real client IPs from the VPC internal load balancer
  set_real_ip_from 10.0.0.0/16;
  real_ip_header     X-Forwarded-For;
  real_ip_recursive  on;

  # Security headers
  add_header X-Frame-Options                "SAMEORIGIN"   always;
  add_header X-Content-Type-Options         "nosniff"      always;
  add_header X-XSS-Protection               "1; mode=block" always;
  add_header Strict-Transport-Security      "max-age=31536000; includeSubDomains; preload" always;
  add_header Referrer-Policy                "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy             "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com https://lh3.googleusercontent.com; connect-src 'self' wss://api.intellmeet.com https://api.intellmeet.com stun:stun.l.google.com stun:stun1.l.google.com; font-src 'self'; object-src 'none'; frame-src 'none'; worker-src 'self' blob:;" always;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain application/json application/javascript text/css image/svg+xml;

  upstream api {
    server backend:5000;
    keepalive 32;
  }
  upstream web {
    server frontend:80;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS ────────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name intellmeet.com www.intellmeet.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Auth — strictest rate limit ─────────────────────────────────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host               $host;
      proxy_set_header   X-Real-IP          $remote_addr;
      proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto  $scheme;
    }

    # ── REST API ────────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host               $host;
      proxy_set_header   X-Real-IP          $remote_addr;
      proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto  $scheme;
    }

    # ── WebSocket (Socket.IO) ───────────────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade            $http_upgrade;
      proxy_set_header   Connection         "upgrade";
      proxy_set_header   Host               $host;
      proxy_set_header   X-Real-IP          $remote_addr;
      proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto  $scheme;
      proxy_read_timeout 86400s;
    }

    # ── Frontend SPA ────────────────────────────────────────────────────────
    # SPA fallback is handled inside the frontend container's own nginx config.
    # Do NOT use try_files here — there are no local files to check.
    location / {
      proxy_pass        http://web;
      proxy_set_header  Host              $host;
      proxy_set_header  X-Real-IP         $remote_addr;
      proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header  X-Forwarded-Proto $scheme;
    }
  }
}
