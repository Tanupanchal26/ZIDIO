apiVersion: apps/v1
kind: Deployment
metadata:
  name: intellmeet-api
  labels:
    app: intellmeet-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: intellmeet-api
  template:
    metadata:
      labels:
        app: intellmeet-api
    spec:
      containers:
        - name: api
          image: <ECR_URI>/intellmeet-backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: intellmeet-api-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: intellmeet-api-svc
spec:
  selector:
    app: intellmeet-api
  ports:
    - port: 80
      targetPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: intellmeet-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: intellmeet-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
