name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  AWS_REGION:       us-east-1
  ECR_BACKEND:      intellmeet-backend
  ECR_FRONTEND:     intellmeet-frontend
  ECS_CLUSTER:      intellmeet-cluster
  ECS_SERVICE_API:  intellmeet-api-service
  ECS_SERVICE_WEB:  intellmeet-web-service

jobs:
  # ── 1. Lint & Test ──────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Backend — install & test
        working-directory: server
        run: |
          npm ci
          npm run lint --if-present
          npm test --if-present

      - name: Frontend — install & build
        working-directory: client
        run: |
          npm ci
          npm run lint --if-present
          npm run build

  # ── 2. Build & Push Docker Images ───────────────────────────────
  build:
    name: Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      backend_image:  ${{ steps.build_backend.outputs.image }}
      frontend_image: ${{ steps.build_frontend.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        id: build_backend
        env:
          REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_BACKEND:$IMAGE_TAG ./server
          docker push $REGISTRY/$ECR_BACKEND:$IMAGE_TAG
          echo "image=$REGISTRY/$ECR_BACKEND:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build & push frontend
        id: build_frontend
        env:
          REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_FRONTEND:$IMAGE_TAG ./client
          docker push $REGISTRY/$ECR_FRONTEND:$IMAGE_TAG
          echo "image=$REGISTRY/$ECR_FRONTEND:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── 3. Deploy to ECS ────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy backend service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_API \
            --force-new-deployment

      - name: Deploy frontend service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_WEB \
            --force-new-deployment
